<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Asset Inventory Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f2;color:#1a1a1a;min-height:100vh}
:root{--blue:#185FA5;--blue-l:#E6F1FB;--green:#3B6D11;--green-l:#EAF3DE;--amber:#854F0B;--amber-l:#FAEEDA;--red:#A32D2D;--red-l:#FCEBEB;--teal:#0F6E56;--teal-l:#E1F5EE;--gray:#5F5E5A;--gray-l:#F1EFE8;--border:#e0ddd6;--radius:10px}
a{color:var(--blue)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const COL_MAP = {
  "Name":"name","Asset Tag":"tag","Asset Type":"assetType","Location":"location",
  "Department":"dept","Used By":"usedBy","Used by (Name)":"usedByName",
  "Managed By":"managedBy","Managed by (Name)":"managedByName","Asset State":"state",
  "Acquisition Date":"acquisitionDate","Warranty Expiry Date":"warrantyExpiry",
  "Warranty":"warranty","Vendor":"vendor","Cost":"price","Product":"model",
  "Physical Subtype":"physicalSubtype","OS":"os","OS Version":"osVersion",
  "Serial Number":"serial","Domain":"domain","Region":"region",
  "Memory(GB)":"ram","Disk Space(GB)":"disk","CPU Speed(GHz)":"cpuSpeed",
  "CPU Core Count":"cpuCores","Last Audit Date":"lastAudit","Description":"description",
  "Impact":"impact","Hostname":"hostname","IP Address":"ipAddress",
  "MAC Address":"macAddress","Last login by":"lastLoginBy","Book Value($)":"bookValue",
};

function extractMake(row){
  const s=(row.model||row.name||row.vendor||"").toLowerCase();
  if(s.includes("dell")) return "Dell";
  if(s.includes("hp")||s.includes("elitebook")||s.includes("probook")) return "HP";
  if(s.includes("lenovo")||s.includes("thinkpad")) return "Lenovo";
  if(s.includes("apple")||s.includes("macbook")||s.includes("mac")) return "Apple";
  if(s.includes("microsoft")||s.includes("surface")) return "Microsoft";
  if(s.includes("asus")) return "Asus";
  if(s.includes("acer")) return "Acer";
  return row.vendor||"Other";
}

function parseCSV(text){
  const norm=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines=norm.trim().split("\n").filter(l=>l.trim());
  if(lines.length<2) return [];
  const first=lines[0];
  const tabs=(first.match(/\t/g)||[]).length;
  const commas=(first.match(/,/g)||[]).length;
  const semis=(first.match(/;/g)||[]).length;
  let delim=",";
  if(tabs>=commas&&tabs>=semis) delim="\t";
  else if(semis>commas) delim=";";
  const split=row=>{
    if(delim==="\t") return row.split("\t").map(v=>v.trim().replace(/^"|"$/g,""));
    const res=[];let cur="";let inQ=false;
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===delim&&!inQ){res.push(cur.trim());cur="";}
      else cur+=c;
    }
    res.push(cur.trim());
    return res;
  };
  const headers=split(lines[0]).map(h=>h.replace(/^\uFEFF/,"").trim());
  if(headers.length<2) return [];
  return lines.slice(1).map((line,idx)=>{
    if(!line.trim()) return null;
    const vals=split(line);
    const raw={};
    headers.forEach((h,i)=>{raw[h]=(vals[i]||"").replace(/^"|"$/g,"").trim();});
    const row={id:"R"+idx};
    Object.entries(COL_MAP).forEach(([col,field])=>{if(raw[col]!==undefined) row[field]=raw[col];});
    if(!row.name){const k=Object.keys(raw).find(h=>/^name$/i.test(h.trim()));if(k) row.name=raw[k];}
    if(!row.state){const k=Object.keys(raw).find(h=>/asset.?state/i.test(h));if(k) row.state=raw[k];}
    if(!row.location){const k=Object.keys(raw).find(h=>/location/i.test(h));if(k) row.location=raw[k];}
    if(!row.acquisitionDate){const k=Object.keys(raw).find(h=>/acqui/i.test(h));if(k) row.acquisitionDate=raw[k];}
    if(!row.warrantyExpiry){const k=Object.keys(raw).find(h=>/warranty.expir/i.test(h));if(k) row.warrantyExpiry=raw[k];}
    if(!row.model){const k=Object.keys(raw).find(h=>/product|model/i.test(h));if(k) row.model=raw[k];}
    if(!row.dept){const k=Object.keys(raw).find(h=>/department/i.test(h));if(k) row.dept=raw[k];}
    if(!row.usedByName){const k=Object.keys(raw).find(h=>/used.by.*name/i.test(h));if(k) row.usedByName=raw[k];}
    if(!row.tag){const k=Object.keys(raw).find(h=>/asset.tag/i.test(h));if(k) row.tag=raw[k];}
    row.make=extractMake(row);
    const sr=(row.state||"").toLowerCase();
    if(sr.includes("in use")||sr.includes("assigned")||sr.includes("in-use")) row.state="In Use";
    else if(sr.includes("stock")||sr.includes("available")||sr.includes("spare")||sr.includes("in stock")) row.state="In Stock";
    else if(sr.includes("repair")||sr.includes("maintenance")) row.state="Under Repair";
    else if(sr.includes("retire")) row.state="Retired";
    else if(sr.includes("dispos")) row.state="Disposed";
    else if(!row.state) row.state="Unknown";
    return row;
  }).filter(Boolean).filter(r=>r.name||r.tag||r.model);
}

const today=new Date();
const ageYears=d=>d?(today-new Date(d))/(365.25*86400000):0;
const daysToExpiry=d=>d?Math.ceil((new Date(d)-today)/86400000):null;
const warrantyStatus=d=>{const days=daysToExpiry(d);if(days===null)return"unknown";if(days<0)return"expired";if(days<90)return"expiring";return"active";};
const ageColor=y=>y<1?"#3B6D11":y<2?"#185FA5":y<3?"#BA7517":y<4?"#E07000":"#A32D2D";
const wColor=s=>({active:"#3B6D11",expiring:"#BA7517",expired:"#A32D2D",unknown:"#888"}[s]);
const wBg=s=>({active:"#EAF3DE",expiring:"#FAEEDA",expired:"#FCEBEB",unknown:"#F1EFE8"}[s]);
const stateColor=s=>({["In Use"]:"#185FA5",["In Stock"]:"#3B6D11",["Under Repair"]:"#BA7517","Retired":"#888","Disposed":"#A32D2D"}[s]||"#888");
const stateBg=s=>({["In Use"]:"#E6F1FB",["In Stock"]:"#EAF3DE",["Under Repair"]:"#FAEEDA","Retired":"#F1EFE8","Disposed":"#FCEBEB"}[s]||"#F1EFE8");
const makeColor=m=>({Dell:"#185FA5",HP:"#0F6E56",Lenovo:"#854F0B",Apple:"#5F5E5A",Microsoft:"#534AB7"}[m]||"#888");

function scoreStandby(f,c){
  let s=0;
  if(c.model&&f.model&&c.model===f.model) s+=40;
  else if(c.make&&f.make&&c.make===f.make) s+=20;
  if(c.os&&f.os&&c.os===f.os) s+=20;
  if(c.ram&&f.ram&&c.ram===f.ram) s+=10;
  if(c.disk&&f.disk&&c.disk===f.disk) s+=5;
  s-=Math.floor(ageYears(c.acquisitionDate))*10;
  const ws=warrantyStatus(c.warrantyExpiry);
  if(ws==="active") s+=15; if(ws==="expiring") s+=5; if(ws==="expired") s-=10;
  return Math.max(0,s);
}

function KPI({label,value,sub,color="#185FA5"}){return(<div style={{background:"#fff",border:"1px solid #e0ddd6",borderRadius:10,padding:"14px 16px",minWidth:110}}><div style={{fontSize:26,fontWeight:700,color,lineHeight:1}}>{value}</div><div style={{fontSize:12,color:"#888",marginTop:4}}>{label}</div>{sub&&<div style={{fontSize:11,color,marginTop:5,fontWeight:500}}>{sub}</div>}</div>);}
function Badge({label,color,bg}){return<span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:500,color,background:bg,whiteSpace:"nowrap"}}>{label}</span>;}
function Card({children,style={}}){return<div style={{background:"#fff",border:"1px solid #e0ddd6",borderRadius:10,padding:16,...style}}>{children}</div>;}
function CardTitle({children}){return<div style={{fontSize:13,fontWeight:600,color:"#333",marginBottom:12}}>{children}</div>;}

function BarChart({data,height=80}){
  const max=Math.max(...data.map(d=>d.value),1);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:5,height:height+42}}>{data.map((d,i)=>(<div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:1}}><span style={{fontSize:10,fontWeight:600,color:"#555"}}>{d.value}</span><div style={{width:"100%",height:Math.max(4,d.value/max*height),background:d.color||"#185FA5",borderRadius:"3px 3px 0 0"}}/><span style={{fontSize:10,color:"#888",textAlign:"center",lineHeight:1.2}}>{d.label}</span></div>))}</div>);
}

function DonutChart({data,size=110}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let start=-Math.PI/2;
  const slices=data.map(d=>{const angle=2*Math.PI*(d.value/total);const s=start;start+=angle;return{...d,s,e:s+angle};});
  const arc=(cx,cy,r,s,e)=>{const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);return`M${cx},${cy} L${x1},${y1} A${r},${r},0,${(e-s)>Math.PI?1:0},1,${x2},${y2}Z`;};
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{slices.map((sl,i)=><path key={i} d={arc(size/2,size/2,size/2-4,sl.s,sl.e)} fill={sl.color}/>)}<circle cx={size/2} cy={size/2} r={size/2-26} fill="white"/><text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle" style={{fontSize:13,fontWeight:700,fill:"#333"}}>{total}</text></svg>);
}

function DashboardTab({assets}){
  const enriched=useMemo(()=>assets.map(a=>({...a,make:a.make||extractMake(a),ageYrs:ageYears(a.acquisitionDate),wStatus:warrantyStatus(a.warrantyExpiry)})),[assets]);
  const total=enriched.length,inUse=enriched.filter(a=>a.state==="In Use").length,inStock=enriched.filter(a=>a.state==="In Stock").length,underRepair=enriched.filter(a=>a.state==="Under Repair").length,wExpiring=enriched.filter(a=>a.wStatus==="expiring").length,wExpired=enriched.filter(a=>a.wStatus==="expired").length;
  const avgAge=(enriched.reduce((s,a)=>s+a.ageYrs,0)/Math.max(total,1)).toFixed(1);
  const countBy=field=>{const m={};enriched.forEach(a=>{const v=a[field]||"Unknown";m[v]=(m[v]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
  const locData=countBy("location").map(([l,v])=>({label:l,value:v,color:"#185FA5"}));
  const makeData=countBy("make").map(([l,v])=>({label:l,value:v,color:makeColor(l)}));
  const deptData=countBy("dept").filter(d=>d[0]&&d[0]!=="Unknown").slice(0,7).map(([l,v])=>({label:l,value:v,color:"#534AB7"}));
  const osData=countBy("os").map(([l,v])=>({label:l,value:v}));
  const stateDonut=countBy("state").map(([l,v])=>({label:l,value:v,color:stateColor(l)}));
  const regionData=countBy("region").map(([l,v])=>({label:l,value:v,color:"#0F6E56"}));
  const ageBuckets=[["<1y",0],["1–2y",0],["2–3y",0],["3–4y",0],["4+y",0]];
  const agePalette=["#3B6D11","#185FA5","#BA7517","#E07000","#A32D2D"];
  enriched.forEach(a=>{const y=a.ageYrs;if(y<1)ageBuckets[0][1]++;else if(y<2)ageBuckets[1][1]++;else if(y<3)ageBuckets[2][1]++;else if(y<4)ageBuckets[3][1]++;else ageBuckets[4][1]++;});
  const ageData=ageBuckets.map(([l,v],i)=>({label:l,value:v,color:agePalette[i]}));
  const expiryList=enriched.filter(a=>a.warrantyExpiry).map(a=>({...a,days:daysToExpiry(a.warrantyExpiry)})).filter(a=>a.days!==null&&a.days<180).sort((a,b)=>a.days-b.days).slice(0,10);
  const locs=[...new Set(enriched.map(a=>a.location).filter(Boolean))].sort();
  const states=["In Use","In Stock","Under Repair","Retired"];
  const matrix={};enriched.forEach(a=>{if(!a.location)return;if(!matrix[a.location])matrix[a.location]={};matrix[a.location][a.state]=(matrix[a.location][a.state]||0)+1;});
  return(
    <div style={{padding:20,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(118px,1fr))",gap:10}}>
        <KPI label="Total assets" value={total} color="#185FA5"/>
        <KPI label="In use" value={inUse} color="#0F6E56"/>
        <KPI label="In stock" value={inStock} color="#3B6D11"/>
        <KPI label="Under repair" value={underRepair} color="#854F0B"/>
        <KPI label="Warranty expiring" value={wExpiring} color="#854F0B" sub="within 90 days"/>
        <KPI label="Warranty expired" value={wExpired} color="#A32D2D"/>
        <KPI label="Avg fleet age" value={avgAge+"y"} color="#185FA5"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
        <Card><CardTitle>Asset state</CardTitle><div style={{display:"flex",alignItems:"center",gap:14}}><DonutChart data={stateDonut}/><div style={{display:"flex",flexDirection:"column",gap:6}}>{stateDonut.map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}><div style={{width:9,height:9,borderRadius:"50%",background:d.color,flexShrink:0}}/><span style={{color:"#555"}}>{d.label}</span><span style={{fontWeight:700,color:"#333",marginLeft:"auto",paddingLeft:8}}>{d.value}</span></div>))}</div></div></Card>
        <Card><CardTitle>Fleet age distribution</CardTitle><BarChart data={ageData} height={80}/></Card>
        <Card><CardTitle>By make / vendor</CardTitle><BarChart data={makeData} height={80}/></Card>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Card><CardTitle>By location</CardTitle><BarChart data={locData} height={75}/></Card>
        <Card><CardTitle>By region</CardTitle><BarChart data={regionData} height={75}/></Card>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Card><CardTitle>By department (top 7)</CardTitle><BarChart data={deptData} height={75}/></Card>
        <Card><CardTitle>By OS</CardTitle><div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>{osData.map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,color:"#555",width:110,flexShrink:0}}>{d.label}</span><div style={{flex:1,height:8,background:"#f0ede6",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",background:"#534AB7",borderRadius:4,width:`${d.value/Math.max(...osData.map(x=>x.value),1)*100}%`}}/></div><span style={{fontSize:11,fontWeight:700,color:"#333",width:20,textAlign:"right"}}>{d.value}</span></div>))}</div></Card>
      </div>
      <Card>
        <CardTitle>Warranty expiring / expired — next 180 days</CardTitle>
        {expiryList.length===0?<div style={{color:"#aaa",fontSize:13}}>No upcoming expirations.</div>:expiryList.map((a,i)=>{const col=a.days<0?"#A32D2D":a.days<90?"#BA7517":"#3B6D11";const lbl=a.days<0?`Expired ${Math.abs(a.days)}d ago`:`${a.days}d left`;return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}><span style={{fontSize:12,color:"#555",width:200,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.model||a.name} — {a.usedByName||a.tag}</span><div style={{flex:1,height:7,background:"#f0ede6",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",background:col,borderRadius:4,width:`${Math.min(Math.abs(a.days)/180,1)*100}%`}}/></div><span style={{fontSize:11,color:col,fontWeight:500,width:130,textAlign:"right"}}>{lbl}</span></div>);})}
      </Card>
      <Card>
        <CardTitle>Location × asset state matrix</CardTitle>
        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}><thead><tr><th style={{textAlign:"left",padding:"6px 10px",borderBottom:"2px solid #e0ddd6",color:"#666",fontWeight:500}}>Location</th>{states.map(s=><th key={s} style={{textAlign:"center",padding:"6px 10px",borderBottom:"2px solid #e0ddd6",color:stateColor(s),fontWeight:500}}>{s}</th>)}<th style={{textAlign:"center",padding:"6px 10px",borderBottom:"2px solid #e0ddd6",color:"#333",fontWeight:600}}>Total</th></tr></thead><tbody>{locs.map(loc=>{const row=matrix[loc]||{};const rowTotal=Object.values(row).reduce((a,b)=>a+b,0);return(<tr key={loc} style={{borderBottom:"1px solid #f0ede6"}}><td style={{padding:"7px 10px",fontWeight:500}}>{loc}</td>{states.map(s=>(<td key={s} style={{textAlign:"center",padding:"7px 10px"}}>{row[s]?<span style={{background:stateBg(s),color:stateColor(s),borderRadius:20,padding:"1px 10px",fontWeight:600,fontSize:12}}>{row[s]}</span>:<span style={{color:"#ccc"}}>—</span>}</td>))}<td style={{textAlign:"center",fontWeight:700,padding:"7px 10px"}}>{rowTotal}</td></tr>);})}</tbody></table></div>
      </Card>
    </div>
  );
}

function StandbyTab({assets,onAllocate}){
  const [selectedId,setSelectedId]=useState("");
  const [results,setResults]=useState(null);
  const [allocLog,setAllocLog]=useState([]);
  const [confirming,setConfirming]=useState(null);
  const [filterLoc,setFilterLoc]=useState("");
  const enriched=useMemo(()=>assets.map(a=>({...a,make:a.make||extractMake(a),ageYrs:ageYears(a.acquisitionDate)})),[assets]);
  const inUseUsers=useMemo(()=>enriched.filter(a=>a.state==="In Use"&&(a.usedByName||a.name)),[enriched]);
  const inStock=useMemo(()=>enriched.filter(a=>a.state==="In Stock"),[enriched]);
  const selectedAsset=useMemo(()=>enriched.find(a=>a.id===selectedId),[enriched,selectedId]);
  const locations=useMemo(()=>[...new Set(inStock.map(a=>a.location).filter(Boolean))].sort(),[inStock]);
  function findStandby(){if(!selectedAsset)return;const pool=filterLoc?inStock.filter(a=>a.location===filterLoc):inStock;const scored=pool.map(a=>({...a,score:scoreStandby(selectedAsset,a)})).sort((a,b)=>b.score-a.score||a.ageYrs-b.ageYrs);setResults(scored);}
  function doAllocate(){if(!confirming||!selectedAsset)return;const log={date:new Date().toLocaleDateString("en-IN"),user:selectedAsset.usedByName||selectedAsset.name,dept:selectedAsset.dept,location:selectedAsset.location,failedTag:selectedAsset.tag,failedModel:selectedAsset.model||selectedAsset.name,standbyTag:confirming.tag,standbyModel:confirming.model||confirming.name,standbyLocation:confirming.location,score:confirming.score};setAllocLog(prev=>[log,...prev]);onAllocate(selectedAsset.id,confirming.id,selectedAsset.usedByName||selectedAsset.name,selectedAsset.dept);setResults(null);setSelectedId("");setConfirming(null);}
  const rankColors=["#3B6D11","#185FA5","#854F0B"],rankBgs=["#EAF3DE","#E6F1FB","#FAEEDA"];
  return(
    <div style={{padding:20,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
        <KPI label="Total standby" value={inStock.length} color="#3B6D11"/>
        {["Dell","HP","Lenovo","Apple"].map(m=>(<KPI key={m} label={`Standby — ${m}`} value={inStock.filter(a=>a.make===m).length} color={makeColor(m)}/>))}
      </div>
      <Card>
        <CardTitle>All available standby laptops (newest first)</CardTitle>
        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}><thead><tr style={{borderBottom:"2px solid #e0ddd6"}}>{["Asset tag","Model","Make","OS","RAM","Disk","Location","Acquired","Age","Warranty","Expiry"].map(h=>(<th key={h} style={{textAlign:"left",padding:"7px 10px",color:"#666",fontWeight:500,whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead><tbody>{[...inStock].sort((a,b)=>ageYears(a.acquisitionDate)-ageYears(b.acquisitionDate)).map(a=>{const age=ageYears(a.acquisitionDate),ws=warrantyStatus(a.warrantyExpiry);return(<tr key={a.id} style={{borderBottom:"1px solid #f0ede6"}}><td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:11}}>{a.tag}</td><td style={{padding:"7px 10px",fontWeight:500}}>{a.model||a.name}</td><td style={{padding:"7px 10px"}}>{a.make}</td><td style={{padding:"7px 10px"}}>{a.os}{a.osVersion?` ${a.osVersion}`:""}</td><td style={{padding:"7px 10px"}}>{a.ram?a.ram+" GB":"—"}</td><td style={{padding:"7px 10px"}}>{a.disk?a.disk+" GB":"—"}</td><td style={{padding:"7px 10px"}}>{a.location}</td><td style={{padding:"7px 10px",fontSize:11}}>{a.acquisitionDate}</td><td style={{padding:"7px 10px"}}><span style={{color:ageColor(age),fontWeight:600}}>{age.toFixed(1)}y</span></td><td style={{padding:"7px 10px"}}><Badge label={ws} color={wColor(ws)} bg={wBg(ws)}/></td><td style={{padding:"7px 10px",fontSize:11,color:"#888"}}>{a.warrantyExpiry||"—"}</td></tr>);})}</tbody></table></div>
      </Card>
      <Card>
        <CardTitle>Allocate standby laptop</CardTitle>
        <div style={{fontSize:12,color:"#888",marginBottom:14}}>Select the user whose laptop failed. System recommends the best match by config and age — newer preferred.</div>
        <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap",marginBottom:12}}>
          <div style={{flex:2,minWidth:220}}><label style={{fontSize:12,fontWeight:500,color:"#555",display:"block",marginBottom:4}}>User (hardware failure)</label><select value={selectedId} onChange={e=>{setSelectedId(e.target.value);setResults(null);}} style={{width:"100%",padding:"8px 10px",border:"1px solid #d0cdc6",borderRadius:8,fontSize:13,background:"#fff"}}><option value="">Select user...</option>{inUseUsers.map(a=>(<option key={a.id} value={a.id}>{a.usedByName||a.name} — {a.model||a.name} ({a.location})</option>))}</select></div>
          <div style={{flex:1,minWidth:140}}><label style={{fontSize:12,fontWeight:500,color:"#555",display:"block",marginBottom:4}}>Preferred location</label><select value={filterLoc} onChange={e=>setFilterLoc(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1px solid #d0cdc6",borderRadius:8,fontSize:13,background:"#fff"}}><option value="">Any location</option>{locations.map(l=><option key={l} value={l}>{l}</option>)}</select></div>
          <button onClick={findStandby} disabled={!selectedId} style={{padding:"9px 22px",background:selectedId?"#185FA5":"#ccc",color:"#fff",border:"none",borderRadius:8,fontWeight:600,fontSize:13,cursor:selectedId?"pointer":"not-allowed",alignSelf:"flex-end"}}>Find standby</button>
        </div>
        {selectedAsset&&(<div style={{background:"#E6F1FB",borderRadius:8,padding:"10px 14px",fontSize:12.5,color:"#185FA5",marginBottom:14}}><span style={{fontWeight:600}}>Current device:</span> {selectedAsset.model||selectedAsset.name} | Make: <b>{selectedAsset.make}</b> | OS: <b>{selectedAsset.os}</b> | RAM: <b>{selectedAsset.ram?selectedAsset.ram+" GB":"—"}</b> | Age: <b>{ageYears(selectedAsset.acquisitionDate).toFixed(1)}y</b> | Location: <b>{selectedAsset.location}</b></div>)}
        {results&&(<div><div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:10}}>{results.length} standby laptops found — ranked by match + age</div>{results.length===0?<div style={{color:"#aaa",fontSize:13,textAlign:"center",padding:24}}>No standby laptops available.</div>:results.map((a,i)=>{const age=a.ageYrs,ws=warrantyStatus(a.warrantyExpiry),isTop=i<3;return(<div key={a.id} style={{border:`1px solid ${isTop?"#c8c4bc":"#ece9e0"}`,borderRadius:9,padding:"11px 14px",marginBottom:8,background:i===0?"#f6fff6":"#fff",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",opacity:a.score===0?0.55:1}}><div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:isTop?rankBgs[i]:"#f1eee8",color:isTop?rankColors[i]:"#888",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13}}>{i+1}</div><div style={{flex:1,minWidth:200}}><div style={{fontWeight:600,fontSize:13}}>{a.model||a.name}</div><div style={{fontSize:11.5,color:"#666",marginTop:2}}>{a.make} · {a.os} · {a.location} · <span style={{color:ageColor(age),fontWeight:600}}>{age.toFixed(1)}y</span> · <span style={{color:wColor(ws)}}>{ws} warranty</span></div><div style={{marginTop:5,height:5,background:"#e8e5de",borderRadius:3,overflow:"hidden",maxWidth:220}}><div style={{height:"100%",background:rankColors[Math.min(i,2)]||"#888",borderRadius:3,width:`${Math.min(a.score/90*100,100)}%`}}/></div><div style={{fontSize:10.5,color:"#999",marginTop:2}}>Score: {a.score} · Tag: {a.tag}</div></div>{isTop&&(<button onClick={()=>setConfirming(a)} style={{padding:"7px 14px",background:i===0?"#3B6D11":"#185FA5",color:"#fff",border:"none",borderRadius:7,fontWeight:600,fontSize:12,cursor:"pointer"}}>Allocate</button>)}</div>);})}</div>)}
      </Card>
      {confirming&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><div style={{background:"#fff",borderRadius:12,padding:24,width:420,maxWidth:"95vw"}}><div style={{fontSize:15,fontWeight:600,marginBottom:12}}>Confirm allocation</div><div style={{fontSize:13,color:"#555",lineHeight:1.7,marginBottom:16}}>Allocate <b>{confirming.model||confirming.name}</b> (<span style={{fontFamily:"monospace",fontSize:11}}>{confirming.tag}</span>) from <b>{confirming.location}</b> to <b>{selectedAsset?.usedByName||selectedAsset?.name}</b>?</div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setConfirming(null)} style={{padding:"7px 14px",background:"#f1eee8",border:"1px solid #d0cdc6",borderRadius:7,cursor:"pointer",fontSize:13}}>Cancel</button><button onClick={doAllocate} style={{padding:"7px 16px",background:"#3B6D11",color:"#fff",border:"none",borderRadius:7,fontWeight:600,fontSize:13,cursor:"pointer"}}>Confirm</button></div></div></div>)}
      {allocLog.length>0&&(<Card><CardTitle>Allocation log</CardTitle><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}><thead><tr style={{borderBottom:"2px solid #e0ddd6"}}>{["Date","User","Dept","Failed","Standby","Location","Score"].map(h=>(<th key={h} style={{textAlign:"left",padding:"6px 10px",color:"#666",fontWeight:500}}>{h}</th>))}</tr></thead><tbody>{allocLog.map((r,i)=>(<tr key={i} style={{borderBottom:"1px solid #f0ede6"}}><td style={{padding:"7px 10px"}}>{r.date}</td><td style={{padding:"7px 10px",fontWeight:500}}>{r.user}</td><td style={{padding:"7px 10px"}}>{r.dept}</td><td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:11}}>{r.failedTag}</td><td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:11}}>{r.standbyTag}</td><td style={{padding:"7px 10px"}}>{r.standbyLocation}</td><td style={{padding:"7px 10px"}}><Badge label={r.score} color="#185FA5" bg="#E6F1FB"/></td></tr>))}</tbody></table></div></Card>)}
    </div>
  );
}

function ImportPanel({onLoad}){
  const [csvText,setCsvText]=useState("");
  const [msg,setMsg]=useState("");
  const [debug,setDebug]=useState(null);
  function handleLoad(){
    const text=csvText.trim();
    if(!text){setMsg("Please paste CSV content first.");return;}
    const norm=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
    const lines=norm.split("\n").filter(l=>l.trim());
    const first=lines[0]||"";
    const dbg={lines:lines.length,cols_tab:first.split("\t").length,cols_comma:first.split(",").length,cols_semi:first.split(";").length,preview:first.slice(0,100)};
    setDebug(dbg);
    if(lines.length<2){setMsg("Only 1 line — paste may be incomplete.");return;}
    if(first.startsWith("<")){setMsg("Got HTML not CSV — open the URL in browser, you'll see plain text.");return;}
    const parsed=parseCSV(norm);
    if(parsed.length===0){setMsg("0 rows parsed — check debug info below.");return;}
    setMsg(`✓ Loaded ${parsed.length} assets.`);
    onLoad(parsed);
  }
  return(
    <div style={{background:"#fff",borderBottom:"1px solid #e0ddd6",padding:"16px 20px"}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Paste CSV data from your Google Sheet</div>
      <div style={{background:"#E6F1FB",borderRadius:8,padding:"10px 14px",fontSize:12.5,color:"#185FA5",marginBottom:12,lineHeight:1.8}}>
        <b>Steps:</b> Open <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Nx3p1zWyHLgN0PPv4mSqXR18ZQd3zcq3nAj3utFp-HxI4_mQ7i6fCGoM9bH9x8kQJD_fXDwjSHAI/pub?gid=1405311158&single=true&output=csv" target="_blank" rel="noreferrer" style={{color:"#0F6E56",fontWeight:600}}>this CSV link</a> in a new tab → press <b>Ctrl+A</b> → <b>Ctrl+C</b> → paste below → click Load
      </div>
      <textarea value={csvText} onChange={e=>{setCsvText(e.target.value);setMsg("");setDebug(null);}} rows={6} placeholder="Paste CSV here..." style={{width:"100%",padding:"10px",border:"1px solid #d0cdc6",borderRadius:8,fontSize:12,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>
      {csvText.trim()&&<div style={{fontSize:11.5,color:"#888",marginTop:4}}>Lines: {csvText.replace(/\r\n/g,"\n").split("\n").filter(Boolean).length} · Tab cols: {(csvText.split("\n")[0]||"").split("\t").length} · Comma cols: {(csvText.split("\n")[0]||"").split(",").length}</div>}
      <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10}}>
        <button onClick={handleLoad} style={{padding:"9px 22px",background:csvText.trim()?"#185FA5":"#ccc",color:"#fff",border:"none",borderRadius:8,fontWeight:600,fontSize:13,cursor:csvText.trim()?"pointer":"not-allowed"}}>Load data</button>
        <button onClick={()=>{setCsvText("");setMsg("");setDebug(null);}} style={{padding:"9px 14px",background:"#f1eee8",border:"1px solid #d0cdc6",borderRadius:8,fontSize:13,cursor:"pointer"}}>Clear</button>
        {msg&&<span style={{fontSize:12.5,color:msg.startsWith("✓")?"#3B6D11":"#A32D2D",fontWeight:500}}>{msg}</span>}
      </div>
      {debug&&<div style={{marginTop:10,background:"#f5f5f2",borderRadius:8,padding:"8px 12px",fontSize:11.5,fontFamily:"monospace",color:"#444",lineHeight:1.8}}><b style={{fontFamily:"sans-serif"}}>Debug:</b> Lines:{debug.lines} | Tab-cols:{debug.cols_tab} | Comma-cols:{debug.cols_comma} | Semi-cols:{debug.cols_semi}<br/>Preview: <span style={{color:"#185FA5"}}>{debug.preview}</span></div>}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState(0);
  const [assets,setAssets]=useState([]);
  const [showImport,setShowImport]=useState(true);
  const [isLive,setIsLive]=useState(false);
  const [lastRefresh,setLastRefresh]=useState(null);
  function handleAllocate(uid,sid,uName,dept){setAssets(prev=>prev.map(a=>a.id===sid?{...a,state:"In Use",usedByName:uName,dept}:a));}
  const tabStyle=active=>({padding:"10px 24px",cursor:"pointer",fontWeight:600,fontSize:13,color:active?"#185FA5":"#666",background:"transparent",border:"none",borderBottom:active?"2px solid #185FA5":"2px solid transparent"});
  return(
    <div style={{background:"#f5f5f2",minHeight:"100vh",fontFamily:"system-ui,sans-serif"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e0ddd6",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15,color:"#1a1a1a"}}>Asset Inventory Dashboard</div>
          <div style={{fontSize:11,color:"#888",marginTop:1}}>{assets.length>0?<span>{assets.length} assets · <span style={{color:"#3B6D11",fontWeight:500}}>● Live data{lastRefresh?` · ${lastRefresh}`:""}</span></span>:<span style={{color:"#BA7517",fontWeight:500}}>● No data loaded — paste your CSV below</span>}</div>
        </div>
        {isLive&&<button onClick={()=>setShowImport(!showImport)} style={{padding:"7px 14px",background:"#f1eee8",border:"1px solid #d0cdc6",borderRadius:7,fontSize:12.5,cursor:"pointer",fontWeight:500}}>{showImport?"Hide":"Update data"}</button>}
      </div>
      {showImport&&<ImportPanel onLoad={parsed=>{setAssets(parsed);setIsLive(true);setLastRefresh(new Date().toLocaleTimeString("en-IN"));setShowImport(false);}}/>}
      {assets.length>0&&<>
        <div style={{background:"#fff",borderBottom:"1px solid #e0ddd6",display:"flex",padding:"0 12px"}}>
          <button style={tabStyle(tab===0)} onClick={()=>setTab(0)}>Dashboard</button>
          <button style={tabStyle(tab===1)} onClick={()=>setTab(1)}>Standby allocation</button>
        </div>
        {tab===0&&<DashboardTab assets={assets}/>}
        {tab===1&&<StandbyTab assets={assets} onAllocate={handleAllocate}/>}
      </>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
